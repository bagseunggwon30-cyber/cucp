interface:
  display_name: "CUCP Computer Use"
  short_description: "Observe, ground, and safely operate the local Windows desktop through CUCP."
  default_prompt: "Use CUCP to observe my current Windows app and report what is visible."
policy:
  allow_implicit_invocation: true
triggers:
  keywords:
    - cucp
    - computer-use
    - computer use
    - windows control
    - desktop control
    - appshot
    - snapshot
    - desktop benchmark
    - screen control
    - app control
    - gui automation
    - label click
    - button click
    - window list
    - selector
    - find-label
    - cdp
    - uia
    - ocr
